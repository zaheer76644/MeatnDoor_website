<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Printable Product Label</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				background: #fff;
				margin: 0;
				padding: 0;
			}

			.category-section {
				margin-bottom: 2rem;
			}

			.category-title {
				font-weight: bold;
				font-size: 1.2rem;
				margin-bottom: 0.8rem;
				color: #333;
				border-bottom: 2px solid #ddd;
				display: inline-block;
				padding-bottom: 2px;
			}

			.product-grid {
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
			}

			.product-card {
				width: 50mm;
				height: 30mm;
				padding: 6px 8px;
				margin: 6px;
				font-size: 0.85rem;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
				background: #fff;
				box-sizing: border-box;
			}

			.product-name {
				font-weight: 600;
				color: #222;
			}

			.product-qty {
				font-size: 0.7rem;
				/* font-weight: bold; */
			}

			.product-price {
				color: #000;
			}

			.use-by {
				font-size: 0.7rem;
			}

			.use-by small {
				/* color: #e63946; */
				font-weight: 600;
			}

			/* ✅ PRINT MODE — one product per page, centered */
			@media print {
				body {
					margin: 0;
					padding: 0;
					background: #fff;
				}

				.category-section,
				.category-title {
					display: none;
					/* Hide headings during print */
				}

				.product-grid {
					display: block;
				}

				.product-card {
					page-break-after: always;
					width: 55mm;
					height: 33mm;
					display: flex;
					margin-left: 3mm;
					margin-top: -1mm;
					transform: none;
					box-sizing: border-box;
					position: relative;
				}

				@page {
					size: 55mm 33mm;
					margin: 0;
				}
			}
		</style>
		<script src="https://cdn.jsdelivr.net/npm/hi-base32@0.5.1/src/base32.min.js"></script>
	</head>

	<body>
		<div id="productContainer">Loading...</div>

		<script>
			const graphqlEndpoint = "https://api.meatify.in/graphql/";
			const ORDER_STORAGE_KEY = "printorderproducts_order";

			function isValidOrderData(data) {
				return (
					data &&
					typeof data === "object" &&
					!Array.isArray(data) &&
					data.number &&
					Array.isArray(data.lines) &&
					data.lines.length > 0
				);
			}

			// ✅ Get product slug from URL (example: ?slug=chicken-breast)
			const urlParams = new URLSearchParams(window.location.search);
			const productSlug = urlParams.get("slug");

			if (productSlug) {
				document.getElementById("productContainer").innerHTML = "<p>No product selected.</p>";
			} else {
				const GET_PRODUCTS_BY_IDS = `
            query GetProductsByIds($ids: [ID!]!) {
                products(channel: "in", filter: { ids: $ids }, first: 100) {
                edges {
                    node {
                    id
                    name
                    description
                    category { name }
                    attributes {
                        attribute { name slug }
                        values { name }
                    }
                    variants {
                        name
                        attributes {
                        attribute { name slug }
                        values { name }
                        }
                    }
                    pricing {
                        priceRange {
                        start {
                            gross {
                            amount
                            currency
                            }
                        }
                        }
                    }
                    }
                }
                }
            }
            `;

				function getCustomerOrderCountFromOrder(order) {
					if (order?.user?.orders?.totalCount != null) {
						return order.user.orders.totalCount;
					}
					if (order?.user?.orderCount != null) {
						return order.user.orderCount;
					}
					if (order?.customerOrderCount != null) {
						return order.customerOrderCount;
					}
					const metaKeys = ["customer_order_count", "order_count", "total_orders", "customer_orders"];
					for (const key of metaKeys) {
						const value = order?.metadata?.find((item) => item?.key === key)?.value;
						if (value != null && value !== "") {
							const parsed = parseInt(value, 10);
							return Number.isNaN(parsed) ? value : parsed;
						}
					}
					return null;
				}

				async function fetchProductsByIds(ids) {
					const response = await fetch(graphqlEndpoint, {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({
							query: GET_PRODUCTS_BY_IDS,
							variables: { ids },
						}),
					});

					const json = await response.json();
					return json?.data?.products?.edges?.map((e) => e.node) || [];
				}

				async function fetchCustomerOrderCount(order) {
					const fromPayload = getCustomerOrderCountFromOrder(order);
					if (fromPayload != null) {
						return fromPayload;
					}

					const email = order?.userEmail || order?.user?.email || "";
					const userId = order?.user?.id || "";
					if (!email && !userId) {
						return null;
					}

					try {
						const response = await fetch(`${window.location.origin}/api/customer-order-count`, {
							method: "POST",
							headers: { "Content-Type": "application/json" },
							body: JSON.stringify({ email, user_id: userId }),
						});
						if (!response.ok) {
							return null;
						}
						const data = await response.json();
						return data?.total_count ?? data?.totalCount ?? data?.count ?? data?.order_count ?? null;
					} catch (e) {
						return null;
					}
				}

				async function handleOrder(order) {
					const deliveryDate = order?.metadata?.find((item) => item?.key === "Delivery_Date")?.value || "";
					if (deliveryDate) {
						let dDate = new Date(deliveryDate);
						// Handle DD-MM-YYYY or DD/MM/YYYY
						if (isNaN(dDate.getTime()) && deliveryDate.match(/^\d{2}[\/\-]\d{2}[\/\-]\d{4}$/)) {
							const parts = deliveryDate.split(/[\/\-]/);
							dDate = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); // YYYY-MM-DD
						}

						if (!isNaN(dDate.getTime())) {
							const today = new Date();
							today.setHours(0, 0, 0, 0);
							dDate.setHours(0, 0, 0, 0);
							if (dDate > today) {
								const proceed = confirm(
									`The delivery date for this order is in the future (${deliveryDate}). Do you want to proceed?`,
								);
								if (!proceed) {
									const container = document.getElementById("productContainer");
									if (container)
										container.innerHTML = "<p>Order display cancelled (future delivery date).</p>";
									return;
								}
							}
						}
					}

					const validationDeliveryTime =
						order?.metadata?.find((item) => item?.key === "Delivery_Time")?.value || "";
					const firstTimePart = validationDeliveryTime.split("-")[0].trim().toUpperCase();
					let time = firstTimePart;
					let firstPartOnly = time.replace(/AM|PM/g, "").trim();
					const isDeliveryAM = firstTimePart.includes("AM");
					const isDeliveryPM = firstTimePart.includes("PM");
					const currentHour = new Date().getHours();
					const isCurrentAM = currentHour < 12;
					const isCurrentPM = currentHour >= 12;
					if (validationDeliveryTime) {
						if (isCurrentAM && isDeliveryPM) {
							const proceed = confirm(
								`The delivery time for this order is PM (${validationDeliveryTime}), but the current time is AM. Do you want to proceed?`,
							);
							if (!proceed) {
								const container = document.getElementById("productContainer");
								if (container)
									container.innerHTML = "<p>Order display cancelled (delivery time mismatch).</p>";
								return;
							}
						} else if (isCurrentPM && isDeliveryAM) {
							const proceed = confirm(
								`The delivery time for this order is AM (${validationDeliveryTime}), but the current time is PM. Do you want to proceed?`,
							);
							if (!proceed) {
								const container = document.getElementById("productContainer");
								if (container)
									container.innerHTML = "<p>Order display cancelled (delivery time mismatch).</p>";
								return;
							}
						}
					}

					function getSavingAmount(product) {
						const variant = product.variants?.[0];
						if (!variant) return null;
						const savingAttr = variant.attributes.find((attr) => attr.attribute?.slug === "saving-amount");
						if (!savingAttr) return null;
						const value = savingAttr.values?.[0]?.name;
						return value && value.trim() !== "" ? value : null;
					}

					function renderProduct(product, linePrice) {
						const container = document.getElementById("productContainer");
						if (!product) {
							container.innerHTML = "<p>Product not found.</p>";
							return;
						}

						const variant = product.variants?.[0];
						const netWeight =
							product.attributes?.find((a) => a.attribute.slug === "net-weight")?.values?.[0]?.name ||
							variant?.attributes?.find((a) => a.attribute.slug === "net-weight")?.values?.[0]?.name ||
							"";

						const netWeightText = netWeight || "";
						const savingAmount = getSavingAmount(product);

						const encoded = base32.encode(order?.number || "");
						const order_id = encoded.replace(/=+$/, "");

						const today = new Date();
						today.setDate(today.getDate() + 2);
						const futureDateText = today.toLocaleDateString("en-IN", {
							day: "numeric",
							month: "long",
							year: "numeric",
							timeZone: "Asia/Kolkata",
						});

						const card = document.createElement("div");
						card.className = "product-card";
						card.innerHTML = `
                        <div class="product-name">${order_id + order.number}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">MRP ₹<span style="text-decoration: line-through;">${savingAmount} </span>&nbsp; <span style="font-weight:bold;">${linePrice.toFixed(
													2,
												)} </span> </div>
                        <div class="use-by">Use by: <small>${futureDateText}</small></div>
                        ${
													netWeightText
														? `<div class="product-qty"><span>Net Weight:</span> <span style="font-weight:bold; font-size:14px">${netWeightText}</span></div>`
														: ""
												}
                    `;
						container.appendChild(card);
					}

					const productIds = order.lines.map((item) => item?.variant?.product?.id);
					const uniqueIds = [...new Set(productIds)];
					const [products, customerOrderCount] = await Promise.all([
						fetchProductsByIds(uniqueIds),
						fetchCustomerOrderCount(order),
					]);
					const container = document.getElementById("productContainer");
					container.innerHTML = "";
					products.forEach((product) => {
						const line = order?.lines?.find((item) => item?.variant?.product?.id === product?.id);
						if (!line) return;
						for (let i = 0; i < line.quantity; i++) {
							let price =
								line?.undiscountedUnitPrice?.gross?.amount ||
								product?.pricing?.priceRange?.start?.gross?.amount ||
								0;
							renderProduct(product, price);
						}
					});
					const encoded = base32.encode(order?.number || "");
					const order_id = encoded.replace(/=+$/, "");
					const totalQuantity = order?.lines
						?.filter((item) => item?.productName !== "Handling Fee")
						?.reduce((sum, line) => sum + (line.quantity || 0), 0);
					const paymentStatus = order?.metadata?.find((item) => item?.key === "paymentMode")?.value || "";
					const totalAmount = order?.total?.gross?.amount || 0;
					const orderCountText = customerOrderCount === 1 ? `F/` : "";
					console.log("orderCountText-------------", orderCountText);
					console.log("customerOrderCount-------------", customerOrderCount);

					const card = document.createElement("div");
					card.className = "product-card";
					const addr = order?.billingAddress || {};
					card.innerHTML = `
                        <div class="product-name">${
													order_id + (order?.number || "")
												} <span class="use-by" style="float: right;">${firstPartOnly}/${orderCountText}${totalQuantity}/₹${
													paymentStatus === "cash_on_delivery" ? totalAmount : 0
												} </span></div>
                        <div class="product-name">${
													(addr.firstName || "") + " " + (addr.lastName || "")
												}</div>
                        <div class="product-name">${
													(addr.streetAddress1 || "") + " " + (addr.streetAddress2 || "")
												}</div>
                        <div class="product-name">${
													(addr.city || "") +
													" " +
													(addr.countryArea || "") +
													" " +
													(addr.country?.country || "")
												}</div>
                        <div class="product-name">${addr.postalCode || ""}<span style="float: right;">${
													addr?.phone
												}</span></div>
                `;
					container.appendChild(card);
				}

				window.addEventListener("message", async (event) => {
					const data = event.data;

					if (data?.type === "CUSTOMER_ORDER_COUNT" && data?.orderNumber) {
						try {
							const saved = sessionStorage.getItem(ORDER_STORAGE_KEY);
							if (saved) {
								const order = JSON.parse(saved);
								if (order?.number === data.orderNumber && data.count != null) {
									order.customerOrderCount = data.count;
									sessionStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(order));
									await handleOrder(order);
								}
							}
						} catch (e) {
							/* ignore */
						}
						return;
					}

					if (!isValidOrderData(data)) {
						return;
					}

					try {
						sessionStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(data));
					} catch (e) {
						/* ignore storage errors */
					}

					await handleOrder(data);
				});

				try {
					const savedOrder = sessionStorage.getItem(ORDER_STORAGE_KEY);
					if (savedOrder) {
						const order = JSON.parse(savedOrder);
						if (isValidOrderData(order)) {
							handleOrder(order);
						}
					}
				} catch (e) {
					/* ignore parse/storage errors */
				}

				if (window.opener && !window.opener.closed) {
					window.opener.postMessage(
						{ type: "PRINT_ORDER_PRODUCTS_READY", needsCustomerOrderCount: true },
						"*",
					);
				}

				// async function fetchProduct(slug) {
				//     const res = await fetch(graphqlEndpoint, {
				//         method: "POST",
				//         headers: { "Content-Type": "application/json" },
				//         body: JSON.stringify({ query, variables: { slug } }),
				//     });
				//     const json = await res.json();
				//     return json.data.product;
				// }

				// async function init() {
				//     const product = await fetchProduct(productSlug);
				//     renderProduct(product);
				// }

				// init();
			}
		</script>
	</body>
</html>
